<div class="login-page">
  <div class="login-overlay"></div>

  <div class="login-topbar">
    <div class="brand-wrap">
      <span class="brand-dot"></span>
      <span class="brand-text">Horizontes sin Límites</span>
    </div>
  </div>

  <div class="login-shell container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="login-card">
          <div class="text-center mb-4">
            <h1 class="login-title">Horizontes sin Límites</h1>
            <p class="login-subtitle">Sistema de Gestión de Viajes</p>
          </div>

          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input
                type="text"
                class="form-control login-input"
                formControlName="username"
                placeholder="Ingrese su usuario">
            </div>

            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control login-input"
                formControlName="password"
                placeholder="Ingrese su contraseña">
            </div>

            <button class="btn login-btn w-100" [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
            </button>
          </form>

          <div class="login-footer text-center mt-4">
            Horizontes sin Límites.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
